<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #1f2937; margin-bottom: 20px; }
        p { color: #6b7280; line-height: 1.6; }
        .icon { font-size: 64px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎓</div>
        <h1>校园墙系统</h1>
        <p>这是一个纯HTML测试页面。如果你能看到这个页面，说明Web服务器正常工作。</p>
        <p>如果看不到背景渐变色，可能是CSS没有加载。</p>
    </div>
</body>
</html>
